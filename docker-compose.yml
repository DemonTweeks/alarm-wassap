version: "3.9"

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - MIDDLEWARE_URL=http://api:8000
    volumes:
      - .wwebjs_auth:/app/.wwebjs_auth
    depends_on:
      - api
    restart: unless-stopped
